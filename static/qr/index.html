<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 3rem 1rem;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 2.5rem;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #555;
      margin-bottom: 0.35rem;
    }

    input, select, textarea {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
      background: #fafafa;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #0071e3;
      background: #fff;
    }

    textarea { resize: vertical; min-height: 80px; }

    .field { margin-bottom: 1rem; }

    .options-toggle {
      font-size: 0.85rem;
      color: #0071e3;
      cursor: pointer;
      user-select: none;
      margin-bottom: 1rem;
      display: inline-block;
    }
    .options-toggle:hover { text-decoration: underline; }

    .options { display: none; }
    .options.open { display: block; }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    button {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-generate {
      background: #0071e3;
      color: #fff;
      margin-top: 0.5rem;
    }
    .btn-generate:hover { background: #005bb5; }

    .output {
      margin-top: 1.5rem;
      text-align: center;
      display: none;
    }

    .output canvas {
      border-radius: 8px;
      max-width: 100%;
      height: auto;
    }

    .btn-download {
      background: #f5f5f7;
      color: #0071e3;
      margin-top: 1rem;
      border: 1px solid #d2d2d7;
    }
    .btn-download:hover { background: #e8e8ed; }

    .color-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    input[type="color"] {
      width: 36px;
      height: 36px;
      padding: 2px;
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .color-row .hex {
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>QR Code Generator</h1>

    <div class="field">
      <label for="text">Text or URL</label>
      <textarea id="text" placeholder="Enter text or a URL"></textarea>
    </div>

    <span class="options-toggle" id="optionsToggle">&#9662; Options</span>

    <div class="options" id="options">
      <div class="options-grid">
        <div class="field">
          <label for="size">Size (px)</label>
          <input type="number" id="size" value="200" min="100" max="2000" step="50">
        </div>
        <div class="field">
          <label for="ecl">Error correction</label>
          <select id="ecl">
            <option value="L">Low</option>
            <option value="M" selected>Medium</option>
            <option value="Q">Quartile</option>
            <option value="H">High</option>
          </select>
        </div>
        <div class="field">
          <label>Foreground</label>
          <div class="color-row">
            <input type="color" id="fgColor" value="#000000">
            <input type="text" class="hex" id="fgHex" value="#000000" maxlength="7">
          </div>
        </div>
        <div class="field">
          <label>Background</label>
          <div class="color-row">
            <input type="color" id="bgColor" value="#ffffff">
            <input type="text" class="hex" id="bgHex" value="#ffffff" maxlength="7">
          </div>
        </div>
      </div>
    </div>

    <button class="btn-generate" id="generate">Generate QR Code</button>

    <div class="output" id="output">
      <canvas id="canvas"></canvas>
      <button class="btn-download" id="download">Download PNG</button>
    </div>
  </div>

  <script src="qrious.min.js"></script>
  <script>
    const textEl = document.getElementById('text');
    const sizeEl = document.getElementById('size');
    const eclEl = document.getElementById('ecl');
    const fgColor = document.getElementById('fgColor');
    const fgHex = document.getElementById('fgHex');
    const bgColor = document.getElementById('bgColor');
    const bgHex = document.getElementById('bgHex');
    const canvas = document.getElementById('canvas');
    const outputDiv = document.getElementById('output');
    const toggleBtn = document.getElementById('optionsToggle');
    const optionsDiv = document.getElementById('options');

    const qr = new QRious({ element: canvas });

    // Sync color pickers with hex inputs
    function syncColor(picker, hex) {
      picker.addEventListener('input', () => { hex.value = picker.value; });
      hex.addEventListener('input', () => {
        if (/^#[0-9a-fA-F]{6}$/.test(hex.value)) picker.value = hex.value;
      });
    }
    syncColor(fgColor, fgHex);
    syncColor(bgColor, bgHex);

    toggleBtn.addEventListener('click', () => {
      const open = optionsDiv.classList.toggle('open');
      toggleBtn.innerHTML = (open ? '&#9652;' : '&#9662;') + ' Options';
    });

    function generate() {
      const text = textEl.value.trim();
      if (!text) { outputDiv.style.display = 'none'; return; }

      qr.set({
        value: text,
        size: parseInt(sizeEl.value, 10) || 200,
        level: eclEl.value,
        foreground: fgColor.value,
        background: bgColor.value,
        padding: null
      });

      outputDiv.style.display = 'block';
    }

    document.getElementById('generate').addEventListener('click', generate);

    textEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); generate(); }
    });

    document.getElementById('download').addEventListener('click', () => {
      const a = document.createElement('a');
      a.download = 'qrcode.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    });
  </script>
</body>
</html>
